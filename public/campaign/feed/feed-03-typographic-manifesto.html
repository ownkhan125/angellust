<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AngelLust · Feed 03 · Typographic Manifesto</title>
<style>
  :root{
    --ink:#0b0c10; --cream:#f2eee5; --cream-dim:#cfcabe; --muted:#8b8e9a;
    --line:#2a2d38; --line-strong:#3a3e4d; --gold:#e8b547; --clay:#c84630;
    --serif:"EB Garamond","Times New Roman",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,sans-serif;
    --mono:"JetBrains Mono","Geist Mono",ui-monospace,monospace;
  }
  html,body{margin:0;background:#16171c;display:grid;place-items:center;font-family:var(--sans)}
  .canvas{width:1080px;height:1080px;position:relative;overflow:hidden;color:var(--cream);
    background:
      radial-gradient(900px 600px at 20% 30%, rgba(232,181,71,.07), transparent 60%),
      radial-gradient(900px 700px at 90% 100%, rgba(200,70,48,.08), transparent 60%),
      var(--ink);
  }
  .grain::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.06;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .grid-mask{position:absolute;inset:0;
    background-image:linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px);
    background-size:108px 100%;}
  .top{position:absolute;left:64px;right:64px;top:60px;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
  .brand{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--cream);letter-spacing:0}
  .stack{position:absolute;left:64px;right:64px;top:170px}
  .word{display:block;font-family:var(--serif);font-weight:500;font-size:220px;line-height:.92;letter-spacing:-.035em;color:var(--cream)}
  .word.tab{padding-left:90px}
  .word.italic{font-style:italic;color:var(--gold)}
  .word.outline{color:transparent;-webkit-text-stroke:1.5px var(--cream-dim);text-stroke:1.5px var(--cream-dim)}
  .strike{position:relative;display:inline-block}
  .strike::after{content:"";position:absolute;left:-6px;right:-6px;top:53%;height:6px;background:var(--clay);transform:rotate(-2deg)}
  .meta{position:absolute;left:64px;right:64px;bottom:170px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end}
  .meta p{margin:0;color:var(--cream-dim);font-size:15px;line-height:1.55;max-width:480px}
  .meta .num{font-family:var(--serif);font-size:84px;line-height:1;color:var(--gold);font-style:italic}
  .footer{position:absolute;left:64px;right:64px;bottom:56px;display:flex;justify-content:space-between;border-top:1px solid var(--line-strong);padding-top:24px;font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted)}
</style>
</head>
<body>
<div class="canvas grain">
  <div class="grid-mask"></div>
  <div class="top">
    <span>Manifesto · I</span>
    <span class="brand">AngelLust</span>
    <span>Lorem · Ipsum</span>
  </div>
  <div class="stack">
    <span class="word">Lorem</span>
    <span class="word tab outline">ipsum</span>
    <span class="word italic">dolor.</span>
  </div>
  <div class="meta">
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vivamus a magna a velit cursus rhoncus. Aenean pulvinar diam id ipsum interdum lacinia.</p>
    <span class="num">№ 03</span>
  </div>
  <div class="footer">
    <span>Vol · I — Lorem Ipsum</span>
    <span>Dolor.Sit / 2026</span>
  </div>
</div>
</body>
</html>
