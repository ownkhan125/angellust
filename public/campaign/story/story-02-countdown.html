<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AngelLust · Story 02 · Countdown</title>
<style>
  :root{
    --ink:#0b0c10; --surface:#14161e; --line:#2a2d38; --line-strong:#3a3e4d;
    --cream:#f2eee5; --cream-dim:#cfcabe; --muted:#8b8e9a;
    --gold:#e8b547; --clay:#c84630; --teal:#1f4e5f;
    --serif:"EB Garamond","Times New Roman",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,sans-serif;
    --mono:"JetBrains Mono","Geist Mono",ui-monospace,monospace;
  }
  html,body{margin:0;background:#16171c;display:grid;place-items:center;font-family:var(--sans)}
  .canvas{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--cream);
    background:
      radial-gradient(900px 700px at 50% 20%, rgba(232,181,71,.15), transparent 60%),
      radial-gradient(900px 700px at 50% 85%, rgba(200,70,48,.20), transparent 60%),
      linear-gradient(180deg,#0a0c11,#080a10);
  }
  .grain::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.07;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .top{position:absolute;left:64px;right:64px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.36em;text-transform:uppercase;color:var(--muted)}
  .brand{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--cream);letter-spacing:0}
  .center{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;padding:0 64px}
  .eyebrow{font-family:var(--mono);font-size:14px;letter-spacing:.46em;text-transform:uppercase;color:var(--gold);margin-bottom:34px;display:inline-flex;align-items:center;gap:14px}
  .eyebrow .l{height:1px;width:50px;background:var(--gold)}
  .clock{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:0 auto 50px;max-width:920px}
  .seg{padding:24px 10px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#161821,#0c0d12);position:relative;overflow:hidden}
  .seg::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.05)}
  .seg .v{font-family:var(--serif);font-weight:500;font-size:118px;line-height:1;color:var(--cream);letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .seg .k{margin-top:10px;font-family:var(--mono);font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
  h1{font-family:var(--serif);font-weight:500;font-size:124px;line-height:.94;letter-spacing:-.02em;margin:30px 0 26px;color:var(--cream)}
  h1 em{font-style:italic;color:var(--gold)}
  .sub{color:var(--cream-dim);font-size:22px;line-height:1.5;max-width:680px;margin:0 auto}
  .strip{position:absolute;left:64px;right:64px;bottom:180px;padding:22px 30px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));backdrop-filter:blur(6px)}
  .strip .k{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted)}
  .strip .v{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--cream);margin-top:4px}
  .strip .badge{padding:10px 18px;border:1px solid var(--gold);color:var(--gold);border-radius:999px;font-family:var(--mono);font-size:12px;letter-spacing:.32em;text-transform:uppercase}
  .footer{position:absolute;left:64px;right:64px;bottom:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);border-top:1px solid var(--line);padding-top:22px}
</style>
</head>
<body>
<div class="canvas grain">
  <div class="top">
    <span>Tempus · 02</span>
    <span class="brand">AngelLust</span>
  </div>
  <div class="center">
    <span class="eyebrow"><span class="l"></span>Lorem ipsum dolor<span class="l"></span></span>
    <div class="clock">
      <div class="seg"><div class="v">12</div><div class="k">Dies</div></div>
      <div class="seg"><div class="v">07</div><div class="k">Horae</div></div>
      <div class="seg"><div class="v">42</div><div class="k">Min.</div></div>
      <div class="seg"><div class="v">18</div><div class="k">Sec.</div></div>
    </div>
    <h1>Lorem<br/><em>ipsum.</em></h1>
    <p class="sub">Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip.</p>
  </div>
  <div class="strip">
    <div><div class="k">Sit Amet · Consectetur</div><div class="v">Lorem Hall · VII : 30</div></div>
    <span class="badge">RSVP</span>
  </div>
  <div class="footer">
    <span>Mensis MMXXVI</span>
    <span>Cap. ii</span>
  </div>
</div>
</body>
</html>
