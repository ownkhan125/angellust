<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AngelLust · Story 07 · Archival Paper</title>
<style>
  :root{
    --ink:#0b0c10; --cream:#f2eee5; --paper:#f5efe0; --paper-2:#ebe3cf;
    --muted:#7a7466; --line:#bfb59e; --line-strong:#8b8466;
    --gold:#b88526; --gold-bright:#e8b547; --clay:#8d2c1c; --teal:#1f4e5f;
    --serif:"EB Garamond","Times New Roman",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,sans-serif;
    --mono:"Special Elite","Courier New",ui-monospace,monospace;
  }
  html,body{margin:0;background:#16171c;display:grid;place-items:center;font-family:var(--sans)}
  .canvas{width:1080px;height:1920px;position:relative;overflow:hidden;color:#1e1f25;
    background:
      radial-gradient(70% 50% at 50% 20%, rgba(180,132,36,.12), transparent 60%),
      linear-gradient(180deg, var(--paper), var(--paper-2));
  }
  .canvas::after{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.4' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");mix-blend-mode:multiply;opacity:.18;pointer-events:none}
  .torn-edge{position:absolute;left:0;right:0;top:0;height:40px;background:
    radial-gradient(8px 12px at 4% 0, transparent 50%, rgba(0,0,0,.15) 52%),
    radial-gradient(8px 12px at 12% 0, transparent 50%, rgba(0,0,0,.15) 52%),
    radial-gradient(8px 12px at 20% 0, transparent 50%, rgba(0,0,0,.15) 52%);background-size:8% 100%;opacity:.4}
  .vstamp{position:absolute;top:120px;right:80px;width:140px;height:140px;border-radius:999px;border:3px solid var(--clay);color:var(--clay);display:grid;place-items:center;text-align:center;font-family:var(--serif);font-size:14px;letter-spacing:.16em;text-transform:uppercase;transform:rotate(-12deg);line-height:1.3;opacity:.85;background:radial-gradient(closest-side, rgba(141,44,28,.06), transparent 70%)}
  .vstamp::before{content:"";position:absolute;inset:8px;border:1px solid var(--clay);border-radius:999px}
  .head{position:absolute;left:80px;right:80px;top:130px}
  .mast{font-family:var(--serif);font-style:italic;font-size:46px;color:#1e1f25;display:flex;align-items:baseline;gap:20px}
  .mast small{font-family:var(--mono);font-style:normal;font-size:12px;letter-spacing:.32em;color:var(--muted);text-transform:uppercase}
  h1{font-family:var(--serif);font-weight:500;font-size:130px;line-height:.95;letter-spacing:-.02em;margin:50px 0 0;color:#1e1f25}
  h1 em{font-style:italic;color:var(--gold)}
  .photo-wrap{position:absolute;left:50%;top:760px;transform:translateX(-50%) rotate(-3deg);width:680px;height:520px}
  .tape{position:absolute;width:140px;height:34px;background:rgba(232,181,71,.55);box-shadow:0 4px 12px rgba(0,0,0,.18);border-radius:1px}
  .tape.t1{top:-14px;left:60px;transform:rotate(-3deg)}
  .tape.t2{top:-12px;right:50px;transform:rotate(4deg)}
  .photo{position:absolute;inset:0;background:#1a1a1a;border:14px solid #fff;box-shadow:0 30px 60px -10px rgba(0,0,0,.45);overflow:hidden}
  .photo .ph{position:absolute;inset:0;background:repeating-linear-gradient(45deg,#222 0 8px, #1a1a1a 8px 16px);display:grid;place-items:center;font-family:var(--mono);font-size:13px;letter-spacing:.28em;color:#bbb;text-transform:uppercase}
  .caption{position:absolute;left:80px;right:80px;top:1340px;border-top:1px dashed var(--line-strong);padding-top:30px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end}
  .caption p{margin:0;font-family:var(--serif);font-size:24px;line-height:1.45;color:#2a2b34;font-style:italic;max-width:700px}
  .caption .n{font-family:var(--serif);font-size:60px;color:var(--gold);font-style:italic;line-height:1}
  .footer{position:absolute;left:80px;right:80px;bottom:120px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:20px;font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted)}
  .footer .b{font-family:var(--serif);font-style:italic;font-size:22px;color:#1e1f25;letter-spacing:0;text-transform:none}
</style>
</head>
<body>
<div class="canvas">
  <div class="torn-edge"></div>
  <div class="vstamp">Vidi · 07<br/>Lorem · MMXXVI</div>
  <div class="head">
    <div class="mast">AngelLust<small>· Archivum · vii ·</small></div>
    <h1>Lorem<br/><em>ipsum sit.</em></h1>
  </div>
  <div class="photo-wrap">
    <span class="tape t1"></span><span class="tape t2"></span>
    <div class="photo"><div class="ph">[ Hero Placeholder Image ]</div></div>
  </div>
  <div class="caption">
    <p>“Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt.”</p>
    <span class="n">№ 07</span>
  </div>
  <div class="footer">
    <span>Folium · vii / x</span>
    <span class="b">AngelLust</span>
    <span>Anno MMXXVI</span>
  </div>
</div>
</body>
</html>
