<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AngelLust · Story 10 · District Map</title>
<style>
  :root{
    --ink:#0b0c10; --ink-2:#101218; --surface:#14161e; --line:#2a2d38; --line-strong:#3a3e4d;
    --cream:#f2eee5; --cream-dim:#cfcabe; --muted:#8b8e9a;
    --gold:#e8b547; --gold-soft:#f3cf7a; --clay:#c84630; --teal:#1f4e5f; --teal-soft:#3a7f93;
    --serif:"EB Garamond","Times New Roman",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,sans-serif;
    --mono:"JetBrains Mono","Geist Mono",ui-monospace,monospace;
  }
  html,body{margin:0;background:#16171c;display:grid;place-items:center;font-family:var(--sans)}
  .canvas{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--cream);
    background:
      radial-gradient(900px 700px at 20% 20%, rgba(31,78,95,.45), transparent 60%),
      radial-gradient(900px 700px at 90% 80%, rgba(232,181,71,.20), transparent 60%),
      linear-gradient(180deg,#08111a 0%, #050608 100%);
  }
  .grid{position:absolute;inset:0;
    background-image:
      linear-gradient(to right, rgba(58,127,147,.18) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(58,127,147,.18) 1px, transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);
            mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);}
  .grain::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.07;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .top{position:absolute;left:64px;right:64px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.36em;text-transform:uppercase;color:var(--cream-dim)}
  .brand{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--cream);letter-spacing:0}
  .coord{position:absolute;left:64px;top:160px;display:flex;flex-direction:column;gap:4px;font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase}
  .coord b{color:var(--gold)}
  .head{position:absolute;left:64px;right:64px;top:260px;text-align:left}
  .eyebrow{font-family:var(--mono);font-size:14px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:14px}
  .eyebrow .l{height:1px;width:60px;background:var(--gold)}
  h1{font-family:var(--serif);font-weight:500;font-size:148px;line-height:.92;letter-spacing:-.025em;margin:0;color:var(--cream)}
  h1 em{font-style:italic;color:var(--gold)}
  .map{position:absolute;left:64px;right:64px;top:680px;height:840px;border:1px solid var(--line);border-radius:18px;background:
     radial-gradient(60% 50% at 30% 40%, rgba(58,127,147,.20), transparent 60%),
     linear-gradient(180deg,#0d1219,#070a0e);
     overflow:hidden;box-shadow:0 40px 80px -30px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05)}
  .map svg{position:absolute;inset:0;width:100%;height:100%}
  .pin{position:absolute;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--cream)}
  .pin .d{width:14px;height:14px;border-radius:999px;background:var(--gold);box-shadow:0 0 0 4px rgba(232,181,71,.20), 0 0 24px var(--gold)}
  .pin.alt .d{background:var(--cream);box-shadow:0 0 0 3px rgba(242,238,229,.18)}
  .pin.clay .d{background:var(--clay);box-shadow:0 0 0 4px rgba(200,70,48,.20)}
  .legend{position:absolute;left:24px;bottom:24px;padding:14px 18px;border:1px solid var(--line);border-radius:10px;background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.005));backdrop-filter:blur(8px);font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--cream-dim);text-transform:uppercase;display:flex;flex-direction:column;gap:6px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:999px;margin-right:8px;vertical-align:middle}
  .compass{position:absolute;right:24px;top:24px;width:72px;height:72px;border:1px solid var(--line-strong);border-radius:999px;display:grid;place-items:center;font-family:var(--serif);font-style:italic;color:var(--cream-dim);font-size:18px;background:rgba(11,12,16,.5);backdrop-filter:blur(4px)}
  .compass small{position:absolute;top:6px;font-size:9px;letter-spacing:.32em;color:var(--gold);font-family:var(--mono);font-style:normal}
  .foot{position:absolute;left:64px;right:64px;bottom:96px;display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:22px;font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
</style>
</head>
<body>
<div class="canvas grain">
  <div class="grid"></div>
  <div class="top">
    <span>Districtus · 10</span>
    <span class="brand">AngelLust</span>
  </div>
  <div class="coord">
    <span>Lat <b>00°00′00″</b></span>
    <span>Lng <b>00°00′00″</b></span>
  </div>
  <div class="head">
    <span class="eyebrow"><span class="l"></span>CD · I — Lorem Ipsum</span>
    <h1>Lorem<br/><em>ipsum sit.</em></h1>
  </div>
  <div class="map">
    <svg viewBox="0 0 1000 840" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#3a7f93" stop-opacity=".35"/>
          <stop offset="100%" stop-color="#e8b547" stop-opacity=".18"/>
        </linearGradient>
        <linearGradient id="bd" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#e8b547" stop-opacity=".8"/>
          <stop offset="100%" stop-color="#3a7f93" stop-opacity=".9"/>
        </linearGradient>
      </defs>
      <path d="M120,180 C180,90 320,80 420,140 C520,200 640,160 720,220 C820,290 880,420 820,540 C760,660 600,720 480,700 C340,680 220,640 160,540 C100,440 80,300 120,180 Z" fill="url(#lg)" stroke="url(#bd)" stroke-width="2"/>
      <path d="M200,260 C260,220 360,230 420,290 M520,420 C600,400 680,470 660,540" fill="none" stroke="#cfcabe" stroke-opacity=".4" stroke-dasharray="6 8"/>
      <circle cx="280" cy="320" r="40" fill="none" stroke="#e8b547" stroke-opacity=".5" stroke-dasharray="3 6"/>
      <circle cx="620" cy="500" r="60" fill="none" stroke="#c84630" stroke-opacity=".5" stroke-dasharray="3 6"/>
    </svg>
    <div class="pin" style="left:24%;top:32%"><span class="d"></span>Lorem · I</div>
    <div class="pin alt" style="left:48%;top:48%"><span class="d"></span>Ipsum · II</div>
    <div class="pin clay" style="left:60%;top:64%"><span class="d"></span>Dolor · III</div>
    <div class="pin alt" style="left:30%;top:72%"><span class="d"></span>Sit · IV</div>
    <div class="compass">N<small>↑</small></div>
    <div class="legend">
      <div><i style="background:var(--gold)"></i>Lorem ipsum sit</div>
      <div><i style="background:var(--cream)"></i>Consectetur dolor</div>
      <div><i style="background:var(--clay)"></i>Adipiscing elit</div>
    </div>
  </div>
  <div class="foot">
    <span>Cap · X — Districtus</span>
    <span>x / x — angellust</span>
  </div>
</div>
</body>
</html>
