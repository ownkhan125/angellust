<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AngelLust · Story 03 · Portrait & Quote</title>
<style>
  :root{
    --ink:#0b0c10; --surface:#14161e; --line:#2a2d38; --line-strong:#3a3e4d;
    --cream:#f2eee5; --cream-2:#e8e3d6; --cream-dim:#cfcabe;
    --paper:#f4efe2; --muted:#7a7466;
    --gold:#b88526; --gold-bright:#e8b547; --clay:#8d2c1c; --teal:#1f4e5f;
    --serif:"EB Garamond","Times New Roman",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,sans-serif;
    --mono:"JetBrains Mono","Geist Mono",ui-monospace,monospace;
  }
  html,body{margin:0;background:#16171c;display:grid;place-items:center;font-family:var(--sans)}
  .canvas{width:1080px;height:1920px;position:relative;overflow:hidden;background:var(--ink);color:var(--cream)}
  .top-half{position:absolute;left:0;right:0;top:0;height:55%;background:
     radial-gradient(80% 70% at 50% 30%, rgba(31,78,95,.45), transparent 60%),
     linear-gradient(180deg,#0d0f15,#070809);overflow:hidden}
  .ph-hero{position:absolute;left:80px;right:80px;top:120px;bottom:80px;border:1px dashed var(--line-strong);background:linear-gradient(160deg,#161821,#0a0b10);border-radius:8px;display:grid;place-items:center;font-family:var(--mono);font-size:13px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;overflow:hidden}
  .ph-hero::after{content:"";position:absolute;inset:0;background:
     radial-gradient(50% 40% at 40% 30%, rgba(232,181,71,.20), transparent 60%),
     radial-gradient(60% 50% at 80% 90%, rgba(200,70,48,.16), transparent 60%);}
  .ph-hero span{padding:14px 22px;border:1px solid var(--line-strong);background:rgba(11,12,16,.5);border-radius:2px;position:relative;z-index:2}
  .grain::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.07;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.5' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .top-strip{position:absolute;left:64px;right:64px;top:90px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.36em;text-transform:uppercase;color:var(--cream-dim);z-index:5}
  .brand{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--cream);letter-spacing:0}
  .bottom{position:absolute;left:0;right:0;bottom:0;height:48%;background:linear-gradient(180deg,var(--paper),#ece5d2);color:#1e1f25;padding:88px 80px 100px;display:flex;flex-direction:column;justify-content:space-between}
  .bottom::before{content:"";position:absolute;left:0;right:0;top:0;height:60px;background:
    radial-gradient(80% 100% at 50% 100%, rgba(0,0,0,.18), transparent 60%);pointer-events:none}
  .bottom::after{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.4' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");mix-blend-mode:multiply;opacity:.12;pointer-events:none}
  .qmark{font-family:var(--serif);font-size:160px;line-height:.5;color:var(--gold);font-style:italic;display:block;margin-bottom:-10px}
  blockquote{margin:0;font-family:var(--serif);font-weight:500;font-size:62px;line-height:1.08;letter-spacing:-.015em;color:#1e1f25}
  blockquote em{font-style:italic;color:var(--gold)}
  .attr{margin-top:42px;display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #d1c9b3;padding-top:24px}
  .attr .name{font-family:var(--serif);font-style:italic;font-size:28px;color:#1e1f25}
  .attr .role{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .attr .pg{font-family:var(--mono);font-size:11px;letter-spacing:.32em;color:var(--muted);text-transform:uppercase}
</style>
</head>
<body>
<div class="canvas">
  <div class="top-half grain">
    <div class="top-strip">
      <span>Voces · 03</span>
      <span class="brand">AngelLust</span>
    </div>
    <div class="ph-hero"><span>[ Hero Placeholder Image ]</span></div>
  </div>
  <div class="bottom">
    <div>
      <span class="qmark">“</span>
      <blockquote>Lorem ipsum dolor sit amet, <em>consectetur adipiscing</em> elit sed do eiusmod tempor.</blockquote>
    </div>
    <div class="attr">
      <div>
        <div class="name">— Lorem Ipsum</div>
        <div class="role">Dolor · Sit · Amet</div>
      </div>
      <div class="pg">Pag. iii / 03</div>
    </div>
  </div>
</div>
</body>
</html>
