<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AngelLust · Story 04 · Glass Pillar</title>
<style>
  :root{
    --ink:#0b0c10; --line:#2a2d38; --line-strong:#3a3e4d;
    --cream:#f2eee5; --cream-dim:#cfcabe; --muted:#8b8e9a;
    --gold:#e8b547; --gold-soft:#f3cf7a; --clay:#c84630; --teal:#1f4e5f; --teal-soft:#3a7f93;
    --serif:"EB Garamond","Times New Roman",Georgia,serif;
    --sans:"Inter","Helvetica Neue",Arial,sans-serif;
    --mono:"JetBrains Mono","Geist Mono",ui-monospace,monospace;
  }
  html,body{margin:0;background:#16171c;display:grid;place-items:center;font-family:var(--sans)}
  .canvas{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--cream);
    background:
      radial-gradient(900px 900px at 50% 45%, rgba(58,127,147,.45), transparent 60%),
      radial-gradient(900px 700px at 50% 100%, rgba(11,12,16,.9), transparent 60%),
      linear-gradient(180deg, #07111a 0%, #03060b 100%);
  }
  .caustic{position:absolute;inset:0;background:
     radial-gradient(40% 30% at 30% 20%, rgba(232,181,71,.18), transparent 60%),
     radial-gradient(50% 40% at 70% 60%, rgba(58,127,147,.32), transparent 60%),
     radial-gradient(30% 25% at 80% 30%, rgba(255,255,255,.10), transparent 60%);
     filter:blur(40px);opacity:.85}
  .grid{position:absolute;inset:0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,.05) 1px, transparent 1px);
    background-size:120px 120px;
    -webkit-mask-image:radial-gradient(ellipse at center, black 30%, transparent 80%);}
  .grain::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.06;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .top{position:absolute;left:64px;right:64px;top:96px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;letter-spacing:.36em;text-transform:uppercase;color:var(--cream-dim);z-index:5}
  .brand{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--cream);letter-spacing:0}
  .stage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:520px;height:920px}
  .pillar{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:360px;height:780px;border-radius:30px;
     background:linear-gradient(180deg, rgba(255,255,255,.15) 0%, rgba(255,255,255,.04) 40%, rgba(232,181,71,.22) 100%);
     border:1px solid rgba(255,255,255,.18);
     box-shadow:
        0 80px 160px -40px rgba(0,0,0,.8),
        inset 0 1px 0 rgba(255,255,255,.4),
        inset 20px 40px 60px rgba(255,255,255,.10),
        inset -20px -60px 80px rgba(0,0,0,.25);
     backdrop-filter:blur(8px);
     -webkit-backdrop-filter:blur(8px);
     overflow:hidden;display:grid;place-items:center}
  .pillar::before{content:"";position:absolute;left:8%;top:6%;width:34%;height:60%;background:linear-gradient(180deg, rgba(255,255,255,.45), transparent 80%);border-radius:30px;filter:blur(2px)}
  .pillar::after{content:"";position:absolute;right:12%;bottom:8%;width:18%;height:30%;background:radial-gradient(circle, rgba(255,255,255,.30), transparent 70%);filter:blur(8px)}
  .ph{position:relative;z-index:2;padding:14px 22px;border:1px dashed rgba(255,255,255,.4);background:rgba(11,12,16,.30);border-radius:2px;font-family:var(--mono);font-size:12px;letter-spacing:.26em;color:var(--cream);text-transform:uppercase}
  .reflection{position:absolute;left:50%;bottom:-80px;transform:translateX(-50%);width:520px;height:160px;background:radial-gradient(50% 100% at 50% 0%, rgba(232,181,71,.45), transparent 80%);filter:blur(30px)}
  .body{position:absolute;left:64px;right:64px;bottom:280px;text-align:center;z-index:5}
  .eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;display:inline-flex;align-items:center;gap:14px}
  .eyebrow .l{height:1px;width:50px;background:var(--gold)}
  h1{font-family:var(--serif);font-weight:500;font-size:132px;line-height:.94;letter-spacing:-.02em;margin:0;color:var(--cream)}
  h1 em{font-style:italic;color:var(--gold)}
  .lede{margin:28px auto 0;color:var(--cream-dim);font-size:22px;line-height:1.5;max-width:640px}
  .footer{position:absolute;left:64px;right:64px;bottom:96px;display:flex;justify-content:space-between;border-top:1px solid var(--line);padding-top:22px;font-family:var(--mono);font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
</style>
</head>
<body>
<div class="canvas grain">
  <div class="caustic"></div>
  <div class="grid"></div>
  <div class="top">
    <span>Objectum · 04</span>
    <span class="brand">AngelLust</span>
  </div>
  <div class="stage">
    <div class="pillar"><span class="ph">[ 3D Placeholder Object ]</span></div>
    <div class="reflection"></div>
  </div>
  <div class="body">
    <span class="eyebrow"><span class="l"></span>Lorem ipsum<span class="l"></span></span>
    <h1>Dolor sit <em>amet.</em></h1>
    <p class="lede">Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium.</p>
  </div>
  <div class="footer">
    <span>Cap · IV — Lorem</span>
    <span>2026 · angellust</span>
  </div>
</div>
</body>
</html>
